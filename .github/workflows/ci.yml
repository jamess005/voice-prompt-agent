name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Syntax check (py_compile)
        run: python -m py_compile main.py recorder.py transcriber.py improver.py logger.py

  dockerfile-lint:
    name: Dockerfile lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008

  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (IaC / config scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

  imports:
    name: Smoke-test imports
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y libportaudio2 python3-tk

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: pip install -r requirements.txt

      - name: Smoke-test imports
        run: |
          python -c "
          from recorder import Recorder
          from transcriber import Transcriber
          from improver import Improver, ROLE_PROMPTS, MODES
          from logger import log_session
          assert len(ROLE_PROMPTS) == 6
          assert len(MODES) > 0
          print('All imports OK')
          "
